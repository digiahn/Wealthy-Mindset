<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
  <meta property="og:description" content="{{ site.description }}">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Noto+Serif+KR:wght@300;400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  {% seo %}
</head>
<body>

  <!-- Decorative Background -->
  <div class="bg-texture"></div>
  <div class="gold-line-top"></div>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <div class="brand-block">
        <div class="brand-symbol">₩</div>
        <div class="brand-text">
          <h1 class="site-title"><a href="{{ '/' | relative_url }}">부자들의 경제철학</a></h1>
          <p class="site-tagline">富者의 思考로 바라보는 富의 原理</p>
        </div>
      </div>
      <nav class="site-nav">
        <a href="{{ '/' | relative_url }}" class="nav-link">홈</a>
        <a href="{{ '/wealthy-thinking' | relative_url }}" class="nav-link">부자의 사고법</a>
        <a href="{{ '/wealth-strategy' | relative_url }}" class="nav-link">부의 전략</a>
        <a href="{{ '/money-philosophy' | relative_url }}" class="nav-link">돈의 철학</a>
        <a href="{{ '/success-cases' | relative_url }}" class="nav-link">성공 사례</a>
        <a href="{{ site.youtube_channel }}" class="nav-link nav-youtube" target="_blank" rel="noopener">
          <span class="yt-icon">▶</span> 유튜브
        </a>
      </nav>
    </div>
  </header>

  <!-- Main Content -->
  <main class="site-main">
    {{ content }}
  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-symbol">₩</span>
        <span class="footer-title">부자들의 경제철학</span>
      </div>
      <div class="footer-links">
        <a href="{{ site.youtube_channel }}" target="_blank" rel="noopener">📺 {{ site.youtube_name }}</a>
        <a href="{{ site.naver_blog }}" target="_blank" rel="noopener">📝 네이버 블로그</a>
        <a href="{{ site.portfolio_site }}" target="_blank" rel="noopener">🌐 포트폴리오</a>
      </div>
      <p class="footer-copy">© {{ 'now' | date: "%Y" }} DigiAHN · Wealthy-Mindset. All rights reserved.</p>
      <p class="footer-desc">본 사이트는 교육 목적의 정보 제공을 위한 콘텐츠이며, 투자 권유가 아닙니다.</p>
    </div>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
