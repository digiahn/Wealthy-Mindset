---
layout: default
---
<article class="post-article">
  <header class="post-header">
    <div class="post-meta-top">
      <span class="post-category">{{ page.category | default: "경제철학" }}</span>
      <span class="post-date">{{ page.date | date: "%Y년 %m월 %d일" }}</span>
    </div>
    <h1 class="post-title">{{ page.title }}</h1>
    {% if page.subtitle %}
    <p class="post-subtitle">{{ page.subtitle }}</p>
    {% endif %}
    <div class="post-divider">
      <span class="divider-ornament">◆</span>
    </div>
  </header>

  <div class="post-content">
    {{ content }}
  </div>

  <footer class="post-footer">
    <div class="post-tags">
      {% for tag in page.tags %}
      <span class="tag">#{{ tag }}</span>
      {% endfor %}
    </div>
    <div class="post-share">
      <p>이 콘텐츠가 유익했다면 구독해 주세요</p>
      <a href="{{ site.youtube_channel }}" class="btn-youtube" target="_blank" rel="noopener">
        ▶ 디지안 월드 유튜브 구독
      </a>
    </div>
  </footer>
</article>
