---
layout: default
---

<section class="post-hero">
  <div class="post-hero__inner">
    <div class="post-hero__tag">{{ page.category | default: "인사이트" }}</div>
    <h1 class="post-hero__title">{{ page.title }}</h1>
    <div class="post-hero__meta">
      <span>{{ page.date | date: "%Y년 %m월 %d일" }}</span>
      <span>·</span>
      <span>{{ page.author | default: "DigiAHN" }}</span>
      <span>·</span>
      <span>읽는 시간 약 {{ content | number_of_words | divided_by: 200 | plus: 1 }}분</span>
    </div>
  </div>
</section>

<div class="section--darker">
  <article class="post-body">
    {{ content }}
  </article>
</div>
